{% extends 'base.html' %}
{% block title %}Nuevo producto - ANJOS{% endblock %}
{% block content %}
<a href="{% url 'product_index' %}" class="text-decoration-none small d-block mb-3" style="color:var(--gold)">
    <i class="bi bi-arrow-left me-1"></i> Inventario
</a>
<h2 class="section-title">Agregar producto</h2>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" action="{% url 'product_create' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Nombre *</label>
                    <input type="text" name="name" class="form-control" required value="{{ form_data.name|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Categoría *</label>
                    <select name="category_id" class="form-select" required>
                        <option value="" disabled {% if not form_data.category_id %}selected{% endif %}>Seleccionar categoría</option>
                        {% for cat in categories %}<option value="{{ cat.id }}" {% if form_data.category_id == cat.id|stringformat:'s' %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Descripción *</label>
                    <textarea name="description" class="form-control" rows="3" required>{{ form_data.description|default:'' }}</textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Precio *</label>
                    <input type="number" name="price" class="form-control" step="0.01" min="0.01" required value="{{ form_data.price|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Existencias</label>
                    <input type="number" name="stock" class="form-control" value="{{ form_data.stock|default:'0' }}" min="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Material</label>
                    <input type="text" name="material" class="form-control" value="{{ form_data.material|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Color</label>
                    <input type="text" name="color" class="form-control" value="{{ form_data.color|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Acabado</label>
                    <input type="text" name="finish" class="form-control" value="{{ form_data.finish|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Piedras</label>
                    <input type="text" name="stones" class="form-control" value="{{ form_data.stones|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Talla / Tamaño</label>
                    <input type="text" name="size" class="form-control" value="{{ form_data.size|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Enlace de imagen</label>
                    <input type="text" name="image" class="form-control" placeholder="https://..." value="{{ form_data.image|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Subir imagen</label>
                    <input type="file" name="image_file" class="form-control" accept="image/*">
                </div>
                <div class="col-md-4 d-flex align-items-end gap-3">
                    <div class="form-check">
                        <input type="checkbox" name="is_featured" class="form-check-input" id="featured">
                        <label class="form-check-label" for="featured">Destacado</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" name="is_active" value="true" class="form-check-input" id="active" checked>
                        <label class="form-check-label" for="active">Activo</label>
                    </div>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-gold">Guardar producto</button>
                <a href="{% url 'product_index' %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
