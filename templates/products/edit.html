{% extends 'base.html' %}
{% block title %}Editar producto - ANJOS{% endblock %}
{% block content %}
<a href="{% url 'product_index' %}" class="text-decoration-none small d-block mb-3" style="color:var(--gold)">
    <i class="bi bi-arrow-left me-1"></i> Inventario
</a>
<h2 class="section-title">Editar producto</h2>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" action="{% url 'product_update' pk=product.id %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Nombre *</label>
                    <input type="text" name="name" class="form-control" value="{{ form_data.name|default:product.name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Categoría *</label>
                    <select name="category_id" class="form-select" required>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if form_data.category_id == cat.id|stringformat:'s' or cat.id == product.category_id %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Descripción *</label>
                    <textarea name="description" class="form-control" rows="3" required>{{ form_data.description|default:product.description }}</textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Precio *</label>
                    <input type="number" name="price" class="form-control" step="0.01" value="{{ form_data.price|default:product.price }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Existencias</label>
                    <input type="number" name="stock" class="form-control" value="{{ form_data.stock|default:product.stock }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Material</label>
                    <input type="text" name="material" class="form-control" value="{{ form_data.material|default:product.material|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Color</label>
                    <input type="text" name="color" class="form-control" value="{{ form_data.color|default:product.color|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Acabado</label>
                    <input type="text" name="finish" class="form-control" value="{{ form_data.finish|default:product.finish|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Piedras</label>
                    <input type="text" name="stones" class="form-control" value="{{ form_data.stones|default:product.stones|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Talla / Tamaño</label>
                    <select name="size" class="form-select">
                        <option value="" {% if not form_data.size and not product.size %}selected{% endif %}>— Seleccionar —</option>
                        <optgroup label="Universal">
                            <option value="Universal" {% if form_data.size == 'Universal' or product.size == 'Universal' %}selected{% endif %}>Universal / Única</option>
                        </optgroup>
                        <optgroup label="Tallas generales">
                            <option value="XS" {% if form_data.size == 'XS' or product.size == 'XS' %}selected{% endif %}>XS</option>
                            <option value="S" {% if form_data.size == 'S' or product.size == 'S' %}selected{% endif %}>S</option>
                            <option value="M" {% if form_data.size == 'M' or product.size == 'M' %}selected{% endif %}>M</option>
                            <option value="L" {% if form_data.size == 'L' or product.size == 'L' %}selected{% endif %}>L</option>
                            <option value="XL" {% if form_data.size == 'XL' or product.size == 'XL' %}selected{% endif %}>XL</option>
                        </optgroup>
                        <optgroup label="Anillos">
                            <option value="Talla 4" {% if form_data.size == 'Talla 4' or product.size == 'Talla 4' %}selected{% endif %}>Talla 4</option>
                            <option value="Talla 5" {% if form_data.size == 'Talla 5' or product.size == 'Talla 5' %}selected{% endif %}>Talla 5</option>
                            <option value="Talla 6" {% if form_data.size == 'Talla 6' or product.size == 'Talla 6' %}selected{% endif %}>Talla 6</option>
                            <option value="Talla 7" {% if form_data.size == 'Talla 7' or product.size == 'Talla 7' %}selected{% endif %}>Talla 7</option>
                            <option value="Talla 8" {% if form_data.size == 'Talla 8' or product.size == 'Talla 8' %}selected{% endif %}>Talla 8</option>
                            <option value="Talla 9" {% if form_data.size == 'Talla 9' or product.size == 'Talla 9' %}selected{% endif %}>Talla 9</option>
                            <option value="Talla 10" {% if form_data.size == 'Talla 10' or product.size == 'Talla 10' %}selected{% endif %}>Talla 10</option>
                            <option value="Talla 11" {% if form_data.size == 'Talla 11' or product.size == 'Talla 11' %}selected{% endif %}>Talla 11</option>
                            <option value="Talla 12" {% if form_data.size == 'Talla 12' or product.size == 'Talla 12' %}selected{% endif %}>Talla 12</option>
                            <option value="Talla 13" {% if form_data.size == 'Talla 13' or product.size == 'Talla 13' %}selected{% endif %}>Talla 13</option>
                            <option value="Talla 14" {% if form_data.size == 'Talla 14' or product.size == 'Talla 14' %}selected{% endif %}>Talla 14</option>
                        </optgroup>
                        <optgroup label="Pulseras">
                            <option value="14 cm" {% if form_data.size == '14 cm' or product.size == '14 cm' %}selected{% endif %}>14 cm</option>
                            <option value="15 cm" {% if form_data.size == '15 cm' or product.size == '15 cm' %}selected{% endif %}>15 cm</option>
                            <option value="16 cm" {% if form_data.size == '16 cm' or product.size == '16 cm' %}selected{% endif %}>16 cm</option>
                            <option value="17 cm" {% if form_data.size == '17 cm' or product.size == '17 cm' %}selected{% endif %}>17 cm</option>
                            <option value="18 cm" {% if form_data.size == '18 cm' or product.size == '18 cm' %}selected{% endif %}>18 cm</option>
                            <option value="19 cm" {% if form_data.size == '19 cm' or product.size == '19 cm' %}selected{% endif %}>19 cm</option>
                            <option value="20 cm" {% if form_data.size == '20 cm' or product.size == '20 cm' %}selected{% endif %}>20 cm</option>
                            <option value="21 cm" {% if form_data.size == '21 cm' or product.size == '21 cm' %}selected{% endif %}>21 cm</option>
                        </optgroup>
                        <optgroup label="Collares">
                            <option value="40 cm" {% if form_data.size == '40 cm' or product.size == '40 cm' %}selected{% endif %}>40 cm</option>
                            <option value="42 cm" {% if form_data.size == '42 cm' or product.size == '42 cm' %}selected{% endif %}>42 cm</option>
                            <option value="45 cm" {% if form_data.size == '45 cm' or product.size == '45 cm' %}selected{% endif %}>45 cm</option>
                            <option value="50 cm" {% if form_data.size == '50 cm' or product.size == '50 cm' %}selected{% endif %}>50 cm</option>
                            <option value="55 cm" {% if form_data.size == '55 cm' or product.size == '55 cm' %}selected{% endif %}>55 cm</option>
                            <option value="60 cm" {% if form_data.size == '60 cm' or product.size == '60 cm' %}selected{% endif %}>60 cm</option>
                            <option value="70 cm" {% if form_data.size == '70 cm' or product.size == '70 cm' %}selected{% endif %}>70 cm</option>
                        </optgroup>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Enlace de imagen</label>
                    <input type="text" name="image" class="form-control" value="{{ form_data.image|default:product.image|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Subir nueva imagen</label>
                    <input type="file" name="image_file" class="form-control" accept="image/*">
                </div>
                <div class="col-md-4 d-flex align-items-end gap-3">
                    <div class="form-check">
                        <input type="checkbox" name="is_featured" class="form-check-input" id="featured" {% if form_data.is_featured or product.is_featured %}checked{% endif %}>
                        <label class="form-check-label" for="featured">Destacado</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" name="is_active" value="true" class="form-check-input" id="active" {% if form_data.is_active or product.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="active">Activo</label>
                    </div>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-gold">Guardar cambios</button>
                <a href="{% url 'product_index' %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
