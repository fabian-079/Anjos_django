{% extends 'base.html' %}
{% block title %}Editar Orden - Anjos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Editar Orden {{ order.order_number }}</h3>
    <a href="{% url 'order_show' pk=order.id %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
</div>
<div class="card shadow-sm col-md-7">
    <div class="card-body">
        <form method="post" action="{% url 'order_update' pk=order.id %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="status" class="form-select">
                    {% for value, label in status_choices %}<option value="{{ value }}" {% if order.status == value %}selected{% endif %}>{{ label }}</option>{% endfor %}
                </select>
            </div>
            <div class="mb-3"><label class="form-label">Dirección de envío</label><input type="text" name="shipping_address" class="form-control" value="{{ order.shipping_address }}"></div>
            <div class="mb-3"><label class="form-label">Dirección de facturación</label><input type="text" name="billing_address" class="form-control" value="{{ order.billing_address }}"></div>
            <div class="mb-3"><label class="form-label">Teléfono</label><input type="text" name="phone" class="form-control" value="{{ order.phone|default:'' }}"></div>
            <div class="mb-3">
                <label class="form-label">Método de pago</label>
                <select name="payment_method" class="form-select">
                    {% for value, label in payment_methods %}<option value="{{ value }}" {% if order.payment_method == value %}selected{% endif %}>{{ label }}</option>{% endfor %}
                </select>
            </div>
            <div class="mb-3"><label class="form-label">Notas</label><textarea name="notes" class="form-control" rows="2">{{ order.notes|default:'' }}</textarea></div>
            <button type="submit" class="btn btn-dark">Actualizar</button>
            <a href="{% url 'order_show' pk=order.id %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
