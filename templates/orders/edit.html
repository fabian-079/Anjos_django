{% extends 'base.html' %}
{% block title %}Editar pedido - ANJOS{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <a href="{% url 'order_show' pk=order.id %}" class="text-decoration-none small d-block mb-3" style="color:var(--gold)">
            <i class="bi bi-arrow-left me-1"></i> Ver pedido
        </a>
        <h2 class="section-title">Editar pedido {{ order.order_number }}</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post" action="{% url 'order_update' pk=order.id %}">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Estado del pedido</label>
                            <select name="status" class="form-select">
                                {% for value, label in status_choices %}
                                <option value="{{ value }}" {% if order.status == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Método de pago</label>
                            <select name="payment_method" class="form-select">
                                {% for value, label in payment_methods %}
                                <option value="{{ value }}" {% if order.payment_method == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Dirección de entrega</label>
                            <input type="text" name="shipping_address" class="form-control" value="{{ order.shipping_address }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Dirección de facturación</label>
                            <input type="text" name="billing_address" class="form-control" value="{{ order.billing_address }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Teléfono</label>
                            <input type="text" name="phone" class="form-control" value="{{ order.phone|default:'' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Notas</label>
                            <textarea name="notes" class="form-control" rows="2">{{ order.notes|default:'' }}</textarea>
                        </div>
                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-gold flex-grow-1">Guardar cambios</button>
                            <a href="{% url 'order_show' pk=order.id %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
