{% extends 'base.html' %}
{% block title %}Mi perfil - ANJOS{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <a href="{% url 'dashboard_cliente' %}" class="text-decoration-none small d-block mb-3" style="color:var(--gold)">
            <i class="bi bi-arrow-left me-1"></i> Mi cuenta
        </a>
        <h2 class="section-title">Editar perfil</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post" action="{% url 'profile_edit' %}">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Nombre completo *</label>
                            <input type="text" name="name" class="form-control" value="{{ form_data.name|default:user.name }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Correo electrónico *</label>
                            <input type="email" name="email" class="form-control" value="{{ form_data.email|default:user.email }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Nueva contraseña <span class="text-muted fw-normal">(dejar vacío para mantener la actual)</span></label>
                            <input type="password" name="password" class="form-control" minlength="6">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Teléfono</label>
                            <input type="text" name="phone" class="form-control" value="{{ form_data.phone|default:user.phone|default:'' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Dirección</label>
                            <textarea name="address" class="form-control" rows="2">{{ form_data.address|default:user.address|default:'' }}</textarea>
                        </div>
                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-gold flex-grow-1">Guardar cambios</button>
                            <a href="{% url 'dashboard_cliente' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
