{% extends 'base.html' %}
{% block title %}Editar usuario - ANJOS{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <a href="{% url 'user_index' %}" class="text-decoration-none small d-block mb-3" style="color:var(--gold)">
            <i class="bi bi-arrow-left me-1"></i> Clientes
        </a>
        <h2 class="section-title">Editar usuario</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post" action="{% url 'user_update' pk=user.id %}">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Nombre *</label>
                            <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Correo electrónico *</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Nueva contraseña <span class="text-muted fw-normal">(dejar vacío para mantener)</span></label>
                            <input type="password" name="password" class="form-control" minlength="6">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Teléfono</label>
                            <input type="text" name="phone" class="form-control" value="{{ user.phone|default:'' }}">
                        </div>
                        <div class="col-md-6">
                            <div class="d-flex align-items-end h-100 pb-1">
                                <div class="form-check">
                                    <input type="checkbox" name="is_active" value="true" class="form-check-input" id="is_active" {% if user.is_active %}checked{% endif %}>
                                    <label class="form-check-label" for="is_active">Usuario activo</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Dirección</label>
                            <input type="text" name="address" class="form-control" value="{{ user.address|default:'' }}">
                        </div>
                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-gold flex-grow-1">Guardar cambios</button>
                            <a href="{% url 'user_index' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
