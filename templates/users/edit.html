{% extends 'base.html' %}
{% block title %}Editar Usuario - Anjos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Editar Usuario</h3>
    <a href="{% url 'user_index' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
</div>
<div class="card shadow-sm col-md-6">
    <div class="card-body">
        <form method="post" action="{% url 'user_update' pk=user.id %}">
            {% csrf_token %}
            <div class="mb-3"><label class="form-label">Nombre *</label><input type="text" name="name" class="form-control" value="{{ user.name }}" required></div>
            <div class="mb-3"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" value="{{ user.email }}" required></div>
            <div class="mb-3"><label class="form-label">Nueva contraseña (dejar vacío para no cambiar)</label><input type="password" name="password" class="form-control" minlength="6"></div>
            <div class="mb-3"><label class="form-label">Teléfono</label><input type="text" name="phone" class="form-control" value="{{ user.phone|default:'' }}"></div>
            <div class="mb-3"><label class="form-label">Dirección</label><input type="text" name="address" class="form-control" value="{{ user.address|default:'' }}"></div>
            <div class="mb-3 form-check"><input type="checkbox" name="is_active" value="true" class="form-check-input" {% if user.is_active %}checked{% endif %}><label class="form-check-label">Activo</label></div>
            <button type="submit" class="btn btn-dark">Actualizar</button>
            <a href="{% url 'user_index' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
