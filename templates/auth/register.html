{% extends 'base.html' %}
{% block title %}Crear cuenta - ANJOS{% endblock %}
{% block content %}
<div class="row justify-content-center my-3">
    <div class="col-md-7 col-lg-6">
        <div class="text-center mb-4">
            <i class="bi bi-gem fs-2" style="color:var(--gold)"></i>
            <h2 class="mt-2" style="letter-spacing:4px">ANJOS</h2>
            <p class="text-muted small">Crea tu cuenta y accede a experiencias exclusivas</p>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Nombre completo</label>
                            <input type="text" name="name" class="form-control" required placeholder="Tu nombre">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Correo electrónico</label>
                            <input type="email" name="email" class="form-control" required placeholder="tucorreo@ejemplo.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Teléfono</label>
                            <input type="text" name="phone" class="form-control" placeholder="Opcional">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Ciudad</label>
                            <input type="text" name="address" class="form-control" placeholder="Tu ciudad">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Contraseña</label>
                            <input type="password" name="password" class="form-control" required minlength="6" placeholder="Mínimo 6 caracteres">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Confirmar contraseña</label>
                            <input type="password" name="password2" class="form-control" required placeholder="Repite tu contraseña">
                        </div>
                        <div class="col-12 mt-2">
                            <button type="submit" class="btn btn-gold w-100 py-2">Crear mi cuenta</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <small class="text-muted">¿Ya tienes cuenta? <a href="{% url 'login' %}" style="color:var(--gold)">Iniciar sesión</a></small>
        </div>
    </div>
</div>
{% endblock %}
