{% extends 'base.html' %}
{% block title %}Acceder - ANJOS{% endblock %}
{% block content %}
<div class="row justify-content-center my-3">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <i class="bi bi-gem fs-2" style="color:var(--gold)"></i>
            <h2 class="mt-2" style="letter-spacing:4px">ANJOS</h2>
            <p class="text-muted small">Accede a tu cuenta</p>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Correo electrónico</label>
                        <input type="email" name="email" class="form-control" required autofocus placeholder="tucorreo@ejemplo.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Contraseña</label>
                        <input type="password" name="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-gold w-100 py-2">Ingresar</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <small class="text-muted">¿Aún no tienes cuenta? <a href="{% url 'register' %}" style="color:var(--gold)">Crear cuenta</a></small>
        </div>
    </div>
</div>
{% endblock %}
