{% extends 'base.html' %}
{% block title %}Iniciar Sesión - Anjos{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-gem me-2"></i>Anjos Joyería</h4>
            </div>
            <div class="card-body p-4">
                <h5 class="mb-4 text-center">Iniciar Sesión</h5>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <small>¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
