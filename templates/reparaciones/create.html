{% extends 'base.html' %}
{% block title %}Solicitar reparación - ANJOS{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <a href="{% url 'repair_index' %}" class="text-decoration-none small d-block mb-3" style="color:var(--gold)">
            <i class="bi bi-arrow-left me-1"></i> Mis reparaciones
        </a>
        <div class="text-center mb-4">
            <i class="bi bi-wrench fs-2" style="color:var(--gold)"></i>
            <h2 class="mt-2 section-title d-inline-block ms-2">Solicitar reparación</h2>
            <p class="text-muted small">Cuéntanos sobre tu pieza y te daremos una estimación</p>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post" action="{% url 'repair_create' %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Tu nombre *</label>
                            <input type="text" name="customer_name" class="form-control" value="{{ user.name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Teléfono de contacto *</label>
                            <input type="text" name="phone" class="form-control" value="{{ user.phone|default:'' }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Descripción de la pieza y el problema *</label>
                            <textarea name="description" class="form-control" rows="4" required placeholder="Describe tu joya (tipo, material) y qué necesita reparación..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Foto de la pieza</label>
                            <input type="file" name="image_file" class="form-control" accept="image/*">
                            <small class="text-muted">Opcional. Nos ayuda a evaluar mejor el trabajo.</small>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase" style="letter-spacing:.5px">Comentarios adicionales</label>
                            <textarea name="notes" class="form-control" rows="2" placeholder="Cualquier información relevante..."></textarea>
                        </div>
                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-gold flex-grow-1">Enviar solicitud</button>
                            <a href="{% url 'repair_index' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
