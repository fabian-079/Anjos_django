{% extends 'base.html' %}
{% block title %}Nueva Reparación - Anjos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Solicitar Reparación</h3>
    <a href="{% url 'repair_index' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
</div>
<div class="card shadow-sm col-md-7">
    <div class="card-body">
        <form method="post" action="{% url 'repair_create' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3"><label class="form-label">Nombre del cliente *</label><input type="text" name="customer_name" class="form-control" value="{{ user.name }}" required></div>
            <div class="mb-3"><label class="form-label">Descripción de la joya y el problema *</label><textarea name="description" class="form-control" rows="4" required></textarea></div>
            <div class="mb-3"><label class="form-label">Teléfono de contacto *</label><input type="text" name="phone" class="form-control" value="{{ user.phone|default:'' }}" required></div>
            <div class="mb-3"><label class="form-label">Foto de la joya</label><input type="file" name="image_file" class="form-control" accept="image/*"></div>
            <div class="mb-3"><label class="form-label">Notas adicionales</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-dark">Enviar solicitud</button>
            <a href="{% url 'repair_index' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
